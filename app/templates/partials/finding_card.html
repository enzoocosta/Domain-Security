{% macro render_finding_card(item) -%}
  <article class="finding-card finding-card--{{ item.severity.tone }}">
    <span class="badge badge--{{ item.severity.tone }}">{{ item.severity.label }}</span>
    <p class="finding-card__category">{{ item.category }}</p>
    <h3>{{ item.title }}</h3>
    <p>{{ item.detail }}</p>
  </article>
{%- endmacro %}
