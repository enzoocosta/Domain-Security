<header class="site-header">
  <div class="site-header__inner">
    <a href="/" class="brand">
      <img
        src="{{ url_for('static', path='img/logo.svg') }}"
        alt="Domain Security Checker"
        class="brand__logo"
      >
    </a>

    <nav class="site-nav" aria-label="Navegacao principal">
      <a href="/" class="{% if request.url.path == '/' %}is-active{% endif %}">Analise publica</a>
      <a href="/monitoring" class="{% if request.url.path.startswith('/monitoring') %}is-active{% endif %}">Monitoramento</a>
      <a href="/monitoring-plus" class="{% if request.url.path.startswith('/monitoring-plus') %}is-active{% endif %}">Monitoring Plus</a>
      <a href="/wordpress" class="{% if request.url.path.startswith('/wordpress') %}is-active{% endif %}">WordPress</a>
      {% if request.state.user_role in ['developer', 'admin'] %}
        <a href="/discovery" class="{% if request.url.path.startswith('/discovery') %}is-active{% endif %}">Asset discovery</a>
        <a href="/docs" class="{% if request.url.path.startswith('/docs') %}is-active{% endif %}">API docs</a>
      {% endif %}
    </nav>

    <div class="site-header__actions">
      <button
        type="button"
        class="theme-toggle"
        id="theme-toggle"
        aria-label="Alternar tema"
        aria-pressed="false"
      >
        <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">☀</span>
        <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">☾</span>
        <span class="theme-toggle__label">Tema</span>
      </button>
      {% if request.state.user_email %}
        <span class="user-chip">{{ request.state.user_email }}</span>
        <form method="post" action="/auth/logout" class="inline-form">
          <button type="submit" class="button button--ghost button--small">Sair</button>
        </form>
      {% else %}
        <a href="/auth/login" class="button button--ghost button--small">Entrar</a>
        <a href="/auth/register" class="button button--secondary button--small">Criar conta</a>
      {% endif %}
    </div>
  </div>
</header>
