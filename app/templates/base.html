<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ page_title or "Domain Security Checker" }}{% endblock %}</title>
    <meta name="description" content="{{ meta_description | default('Domain Security Checker — Diagnóstico gratuito de DNS, SPF, DKIM, DMARC, TLS e registro de domínio. Análise pública sem cadastro.') }}">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="{{ title | default(page_title | default('Domain Security Checker')) }}">
    <meta property="og:description" content="{{ meta_description | default('Diagnóstico gratuito de segurança de domínio e autenticação de e-mail.') }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://domainsecurity.com.br{{ request.url.path }}">
    <script>
      (function () {
        var storageKey = "dsc-theme";
        var root = document.documentElement;
        try {
          var stored = localStorage.getItem(storageKey);
          var preferred = stored || "dark";
          root.setAttribute("data-theme", preferred);
        } catch (error) {
          root.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="{{ static_asset(request, 'css/tokens.css') }}" />
    <link rel="stylesheet" href="{{ static_asset(request, 'css/base.css') }}" />
    <link rel="stylesheet" href="{{ static_asset(request, 'css/layout.css') }}" />
    <link rel="stylesheet" href="{{ static_asset(request, 'css/components.css') }}" />
    <link rel="stylesheet" href="{{ static_asset(request, 'css/pages/home.css') }}" />
    <link rel="stylesheet" href="{{ static_asset(request, 'css/pages/result.css') }}" />
    <link rel="stylesheet" href="{{ static_asset(request, 'css/pages/monitoring_plus.css') }}" />
    <link rel="stylesheet" href="{{ static_asset(request, 'css/pages/wordpress.css') }}" />
  </head>
  <body class="app-body page-{{ page_name or 'default' }}">
    <div class="app-background" aria-hidden="true"></div>
    <div class="app-shell">
      {% include "partials/header.html" %}
      <main class="page-shell">
        {% block content %}{% endblock %}
      </main>
      {% include "partials/footer.html" %}
    </div>
    <script src="{{ static_asset(request, 'js/theme.js') }}" defer></script>
    <script src="{{ static_asset(request, 'js/wordpress-selector.js') }}" defer></script>
    <script src="{{ static_asset(request, 'js/wordpress-technical-report.js') }}" defer></script>
  </body>
</html>
