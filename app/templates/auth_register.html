{% extends "base.html" %}

{% block content %}
  <section class="panel">
    <div class="form-card auth-card">
      <h2>Criar conta para monitoramento</h2>
      <p class="muted">Use esta area para acompanhar dominios, execucoes recorrentes e alertas de risco de spoofing.</p>
      {% if error %}
        <div class="message error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/auth/register" class="form-card compact-form">
        <input type="hidden" name="next_path" value="{{ next_path or '/monitoring' }}" />
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" maxlength="320" required />
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" maxlength="128" minlength="8" required />
        <button type="submit">Criar conta</button>
      </form>
      <p><a href="/auth/login{% if next_path %}?next={{ next_path }}{% endif %}">Ja tenho conta</a></p>
    </div>
  </section>
{% endblock %}
