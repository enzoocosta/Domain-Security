{% extends "base.html" %}

{% block content %}
  <section class="panel">
    <div class="form-card auth-card">
      <h2>Entrar no monitoramento</h2>
      <p class="muted">A analise publica continua aberta. O login e exigido apenas para monitoramento recorrente.</p>
      {% if error %}
        <div class="message error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/auth/login" class="form-card compact-form">
        <input type="hidden" name="next_path" value="{{ next_path or '/monitoring' }}" />
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" maxlength="320" required />
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" maxlength="128" required />
        <button type="submit">Entrar</button>
      </form>
      <p><a href="/auth/register{% if next_path %}?next={{ next_path }}{% endif %}">Criar uma conta</a></p>
    </div>
  </section>
{% endblock %}
