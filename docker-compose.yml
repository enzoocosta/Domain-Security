services:
  app:
    build: .
    container_name: dsc_app
    restart: unless-stopped
    env_file: .env
    environment:
      DSC_DATABASE_URL: ${DSC_DATABASE_URL:-sqlite:///./data/domain_security.db}
    volumes:
      - db_data:/app/data
    networks:
      - app_net
    mem_limit: 512m
    cpus: "1.0"

  caddy:
    image: caddy:2-alpine
    container_name: dsc_caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_net

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  app_net:
    driver: bridge
